apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fact.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: "5000"
  DB_PORT: "5432"
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: {{ .Values.config.jwtExpiresIn | quote }}
  JWT_REFRESH_EXPIRES_IN: {{ .Values.config.jwtRefreshExpiresIn | quote }}
  MFA_ISSUER: {{ .Values.config.mfaIssuer | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  AUDIT_LOG_ENABLED: {{ .Values.config.auditLogEnabled | quote }}
  MULTI_TENANT_MODE: {{ .Values.config.multiTenantMode | quote }}
  RATE_LIMIT_MAX: {{ .Values.config.rateLimitMax | quote }}
  AUTH_RATE_LIMIT_MAX: {{ .Values.config.authRateLimitMax | quote }}
