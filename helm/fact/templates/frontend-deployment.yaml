apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fact.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "fact.fullname" . }}-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "fact.fullname" . }}-frontend
        {{- include "fact.labels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ include "fact.frontendImage" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "https://{{ .Values.ingress.backendHost }}"
            - name: VITE_APP_NAME
              value: "FACT FinOS"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
