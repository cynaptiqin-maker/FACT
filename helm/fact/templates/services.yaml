apiVersion: v1
kind: Service
metadata:
  name: {{ include "fact.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app: {{ include "fact.fullname" . }}-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fact.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: {{ include "fact.fullname" . }}-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
