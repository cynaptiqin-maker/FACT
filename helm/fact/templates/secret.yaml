apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fact.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_HOST: {{ .Values.secrets.dbHost | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  REDIS_HOST: {{ .Values.secrets.redisHost | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
