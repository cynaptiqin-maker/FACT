apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fact.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fact.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "fact.fullname" . }}-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "fact.fullname" . }}-backend
        {{- include "fact.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migrate
          image: {{ include "fact.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["node", "scripts/migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ include "fact.fullname" . }}-config
            - secretRef:
                name: {{ include "fact.fullname" . }}-secrets
      containers:
        - name: backend
          image: {{ include "fact.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: {{ include "fact.fullname" . }}-config
            - secretRef:
                name: {{ include "fact.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "fact.fullname" . }}-uploads
