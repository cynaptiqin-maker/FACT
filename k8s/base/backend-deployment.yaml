apiVersion: apps/v1
kind: Deployment
metadata:
  name: fact-backend
  namespace: fact
  labels:
    app: fact-backend
    app.kubernetes.io/part-of: fact-finos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fact-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fact-backend
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migrate
          image: ghcr.io/REPLACE_ORG/fact-backend:latest
          command: ["node", "scripts/migrate.js"]
          envFrom:
            - configMapRef:
                name: fact-config
            - secretRef:
                name: fact-secrets
      containers:
        - name: backend
          image: ghcr.io/REPLACE_ORG/fact-backend:latest
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: fact-config
            - secretRef:
                name: fact-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: fact-uploads-pvc
