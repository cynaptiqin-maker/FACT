# DO NOT commit real secrets — populate via your secrets manager (Vault, AWS SSM, etc.)
# Apply with: kubectl apply -f secret.yaml  (after substituting values)
# Or use External Secrets Operator / Sealed Secrets for GitOps.
apiVersion: v1
kind: Secret
metadata:
  name: fact-secrets
  namespace: fact
type: Opaque
stringData:
  DB_HOST: "postgres-service"
  DB_USER: "fact_user"
  DB_PASSWORD: "REPLACE_ME"
  REDIS_HOST: "redis-service"
  REDIS_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_min_64_chars"
  JWT_REFRESH_SECRET: "REPLACE_ME_min_64_chars"
  OPENAI_API_KEY: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
