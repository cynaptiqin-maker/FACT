apiVersion: v1
kind: ConfigMap
metadata:
  name: fact-config
  namespace: fact
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_PORT: "5432"
  DB_NAME: "fact_db"
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  MFA_ISSUER: "FACT_FinOS"
  LOG_LEVEL: "info"
  AUDIT_LOG_ENABLED: "true"
  MULTI_TENANT_MODE: "true"
  RATE_LIMIT_MAX: "500"
  AUTH_RATE_LIMIT_MAX: "50"
