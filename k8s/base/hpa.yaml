apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fact-backend-hpa
  namespace: fact
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fact-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fact-frontend-hpa
  namespace: fact
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fact-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
