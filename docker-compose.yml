services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fact_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fact_db}
      POSTGRES_USER: ${DB_USER:-fact_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fact_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fact_user} -d ${DB_NAME:-fact_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fact_network

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fact_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fact_network

  # ─── DB Migrate + Seed (one-shot, runs before backend) ──────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fact_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fact_db}
      DB_USER: ${DB_USER:-fact_user}
      DB_PASSWORD: ${DB_PASSWORD:-fact_secret}
    command: >
      sh -c "node scripts/migrate.js && node src/database/seed.js"
    networks:
      - fact_network

  # ─── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fact_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fact_db}
      DB_USER: ${DB_USER:-fact_user}
      DB_PASSWORD: ${DB_PASSWORD:-fact_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwt}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefresh}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MFA_ISSUER: ${MFA_ISSUER:-FACT_FinOS}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3005}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-}
    ports:
      - "${PORT:-5005}:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - fact_network
    command: npm run dev

  # ─── Frontend (React + Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: fact_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5005}
      VITE_APP_NAME: ${VITE_APP_NAME:-FACT FinOS}
    ports:
      - "${FRONTEND_PORT:-3005}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fact_network
    command: npm run dev -- --host 0.0.0.0

  # ─── Adminer (DB GUI) ─────────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: fact_adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    networks:
      - fact_network

  # ─── Elasticsearch (optional — enable with: docker-compose --profile search up) ─
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: fact_elasticsearch
    profiles: ["search"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fact_network

  # ─── Kibana (optional) ────────────────────────────────────────────────────────
  kibana:
    image: kibana:8.12.0
    container_name: fact_kibana
    profiles: ["search"]
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - fact_network

  # ─── Redis Commander (optional) ───────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fact_redis_commander
    profiles: ["debug"]
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}"
    ports:
      - "8081:8081"
    networks:
      - fact_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  fact_network:
    driver: bridge
    name: fact_network
