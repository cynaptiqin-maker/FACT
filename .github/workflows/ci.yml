name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── 1. Backend lint + unit/integration tests ──────────────────────────────
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fact_test
          POSTGRES_USER: fact_user
          POSTGRES_PASSWORD: fact_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fact_user -d fact_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test .env
        run: |
          cat > .env <<EOF
          NODE_ENV=test
          PORT=5001
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=fact_test
          DB_USER=fact_user
          DB_PASSWORD=fact_secret
          DB_SSL=false
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          JWT_SECRET=ci-test-secret-at-least-64-characters-long-for-hmac-sha256
          JWT_REFRESH_SECRET=ci-test-refresh-secret-64-chars-long-for-hmac-sha256-algo
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          MFA_ENFORCE=false
          OPENAI_API_KEY=sk-test
          RATE_LIMIT_MAX=10000
          AUTH_RATE_LIMIT_MAX=1000
          AUDIT_LOG_ENABLED=false
          LOG_LEVEL=error
          EOF

      - name: Run migrations
        run: node scripts/migrate.js

      - name: Run tests
        run: npm test -- --forceExit

  # ─── 2. Frontend build + lint ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─── 3. Security scan (npm audit) ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
